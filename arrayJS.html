<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Array in JS</title>
</head>
<body>
    <script>
        let num=[4,5,2,5,6,3,8,5,6,7,8,9,0];
        console.log(num.length);

        console.log(num.pop()); 

        console.log(num.push(24));

        console.log(num.unshift(3));
        
        console.log(num.shift(4));


    </script>
</body>
</html>
