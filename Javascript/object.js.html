<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>"Object in js"</title>
    
</head>
<body>
    <script>
        //object in JS:collection (pair) of keys (properties) and its values.

        //create an object using literal way...


        let student ={
            name:"Aditi",
            age:19,
            isMarried:false,
            address:{
                streetNo:23,
                area:"Indrapuram",
                city:"GZB",
                pincode:201009
            },
            course:"B.tech",
            branch:"CSE",
            year:2025,
            getInfo:function(){
                return "My Education detail is" +
                student.branch+" "+student.year;

            },
            subjects:["Math","Hindi","Science","Endlish"],
            examDone:null

        };
        //access objject keys or properies
        console.log(student.address.pincode); //object
        console.log(student.getInfo()); //function
        console.log(student.subjects[2]); //array
       // console.log(typeof(student));
       //find any key in your object
       console.log('name'in student );


       //delete any key from object 
       console.log(delete student.name);
       console.log(student);


       //find length of object
       let keyLength=Object.keys(student);
       console.log(keyLength.length);

       //iterate objects lkey(properties)
       for(let i=0;i<keyLength.length;i++){
        console.log(student[keyLength.length[i]]);
       }



       for(let x in student){
        console.log(student[x]);
       }

       //create an object using new keyword
       let myInfo=new Object();
       myInfo.name="Aditi";
       myInfo.city="Delhi";
       myInfo.address=null;
       myInfo.age=19;
       myInfo.mob=63287678676;

       //access object key using[]
       console.log(myInfo['name']);


       
    </script>
</body>
</html>
