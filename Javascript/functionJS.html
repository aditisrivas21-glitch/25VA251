<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Function in JS</title>
</head>
<body>
<script>

// Normal function
function demo(){
    console.log("Hello JS");
}
demo();

// Function with parameter
function demo1(text){
    console.log("Hello " + text);
}
demo1("React");

// Function with default parameter
function add(a, b = 22){
    var num1 = a;
    var num2 = b;
    var res = num1 + num2;
    console.log(res);
}
add(34);

// Synchronous function
function cal1(){   // renamed to avoid conflict

    function add(a,b){
        console.log("addition is: " + (a+b));
    }

    function sub(x,y){
        console.log("subtraction is: " + (x-y));
    }

    function mul(p,q){
        console.log("multiplication is: " + (p*q));
    }
        
    mul(9,6);
    sub(5,7);
    add(2,4);
}
cal1();

// Anonymous function
let msg = function(){
    console.log("Hello World");
}
msg();

// Arrow functions
let msg1 = () => console.log("Hello React");
msg1();

let msg2 = (age) => {
    if(age >= 18){
        console.log("valid age");
    }
}
msg2(23);

// Callback function
function cal(callback){
    var num1 = 12;
    console.log("First function is " + num1);

    var num2 = 20;
    console.log("Second function is " + num2);

    var res = num1 + num2;
    callback(res);
}

function display(res){
    console.log("Result is " + res);
}

// Correct call
cal(display);



//call back hell.....
let promise=new Promise(function(resolve,reject){
    let myage=19;
    if(myage>=18){
   resolve("valid age");
    }
    else{
   reject("not valid age");
}
});
promise.then(result=>console.log(result)).catch(error=>console.log(error));



//fetch API
async function userData(){
    let userResponse=await fetch('https://dummyjson.com/products');
    let userData=await userResponse.json();
    console.log(userData);
}
userData();
//async await with error handling

async function productDetail(){
    try{

   let proRes=await fetch('https://dummyjson.com/products?limit=10&skip=10&select=title,price');
   let proResData=await proRes.json();
   console.log(proResData);
    } catch (error) {
        console.error("Error fetching product details:"+ error);
    }
}
productDetail();


//IIFE:- is a javascript function that runs as soon as it is defined. 
(function(){
    console.log("Hello IIFE");
})();

//short code for above function 

(msg => console.log("Hello IIFE"))();
console.log(typeof (msg));

//Local storage:-Javascript provides a way to store data in the browser using local storage. 
// It allows you to save key-value pairs 



let myInfo = {
    name: "Aditi",
    age: 19,
    Branch: "CSE",
    Section: "15",
    course: "btech"
};
//convert object to string
let myInfoData = JSON.stringify(myInfo); 
//set the data
localStorage.setItem('preference', myInfoData);

//get the data
let myPreference=localStorage.getItem('preference');
//convert string to JSON object
let myPreferenceData = JSON.parse(myPreference);

//access keys
console.log(myPreferenceData.name);


//High order function


//map() Creates a new array populated with the results of calling a provided function on every element in the calling array.


let num=[1,2,3,4,5];
let result=num.map(n=>n*2);
console.log(result);



///reduce.. Accumaltes a single value from an array by applying a function to each element and the accumulated result.
let sum=num.reduce((total,n)=>total+n);
console.log(sum);  //15

//filter 
let sorting=num.filter(n=>n>3);
console.log(sorting);



//forEach:- Executes a provided function once for each array element.


num.forEach(n=>console.log(n*n));
console.log(`updated array is ${num}`);

</script>
    
</body>
</html>
