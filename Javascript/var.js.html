    <script>
        // js data vlaue types in js
        // primitives - single value variables which are immutable
        // number, string, boolean, null, undefined, symbol
        var myName = "Ankit";
        console.log(myName);
        console.log(typeof myName); // to check the data type of variable

        // number
        var mymob = 7800056820;
        console.log(myName + "mymobile number is " + mymob );

        // boolean 
        var isMarried = false;
        console.log(myName + " is Married ? " + isMarried); 

        // undefined
        var myEmail;
        console.log(myEmail); // output is undefined    
        console.log(typeof myEmail); // output is undefined

        // null
        var myAddress = null;   
        console.log(myAddress); // output is null
        console.log(typeof myAddress); // output is object (this is a bug in js)

        // Bigint
         var myVal= BigInt("1234567890123456789012345678901234567890");
         console.log(myVal);
            console.log(typeof myVal);

         var name1 = Symbol("Ankit");
